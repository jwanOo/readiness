name: Sync SAP AI Catalog

on:
  # Run daily at 15:00 UTC (3 PM)
  schedule:
    - cron: '0 15 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

  # Allow trigger from API (for "Sync from SAP" button)
  repository_dispatch:
    types: [sync-sap-catalog]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: Run SAP downloader
        run: |
          cd "Agents Discovery"
          python3 downloader.py

      - name: Copy CSV to public folder
        run: |
          cp "Agents Discovery/sap_ai_raw_data.csv" public/sap_ai_data.csv

      - name: Verify CSV
        run: |
          echo "CSV file size: $(du -h public/sap_ai_data.csv | cut -f1)"
          echo "Total lines: $(wc -l < public/sap_ai_data.csv)"
          echo "AI Agents: $(grep -c 'AI Agent' public/sap_ai_data.csv)"
          echo "AI Features: $(grep -c 'AI Feature' public/sap_ai_data.csv)"

      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add public/sap_ai_data.csv "Agents Discovery/sap_ai_raw_data.csv"

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update SAP AI catalog data [skip ci]

            - Updated from SAP Discovery Center
            - Total use cases: $(wc -l < public/sap_ai_data.csv | tr -d ' ')
            - AI Agents: $(grep -c 'AI Agent' public/sap_ai_data.csv)
            - AI Features: $(grep -c 'AI Feature' public/sap_ai_data.csv)

            Co-Authored-By: GitHub Actions <actions@github.com>"
            git push
          fi

      - name: Create sync summary
        run: |
          echo "## Sync Summary 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Total use cases:** $(expr $(wc -l < public/sap_ai_data.csv) - 1)" >> $GITHUB_STEP_SUMMARY
          echo "- **AI Agents:** $(grep -c 'AI Agent' public/sap_ai_data.csv)" >> $GITHUB_STEP_SUMMARY
          echo "- **AI Features:** $(grep -c 'AI Feature' public/sap_ai_data.csv)" >> $GITHUB_STEP_SUMMARY
          echo "- **File size:** $(du -h public/sap_ai_data.csv | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Sync completed successfully!" >> $GITHUB_STEP_SUMMARY
