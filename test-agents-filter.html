<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test SAP AI Agents Filter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
        .filters {
            margin: 20px 0;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 8px;
        }
        select {
            padding: 8px;
            margin: 0 10px;
            font-size: 14px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        .stat {
            padding: 15px;
            background: #e3f2fd;
            border-radius: 8px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #1976d2;
        }
        .results {
            margin: 20px 0;
        }
        .use-case-card {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .use-case-card.agent {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
        }
        .use-case-card.feature {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
        }
        .type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 8px;
        }
        .agent-badge {
            background: #4caf50;
            color: white;
        }
        .feature-badge {
            background: #ff9800;
            color: white;
        }
        h3 {
            margin: 0 0 10px 0;
        }
        .error {
            color: red;
            padding: 10px;
            background: #ffebee;
            border-radius: 4px;
        }
        .success {
            color: green;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>🤖 SAP AI Agents Filter Test</h1>

    <div id="status"></div>

    <div class="stats">
        <div class="stat">
            <div>Total Use Cases</div>
            <div class="stat-value" id="total">0</div>
        </div>
        <div class="stat">
            <div>🤖 AI Agents</div>
            <div class="stat-value" id="agents">0</div>
        </div>
        <div class="stat">
            <div>✨ AI Features</div>
            <div class="stat-value" id="features">0</div>
        </div>
        <div class="stat">
            <div>Filtered Results</div>
            <div class="stat-value" id="filtered">0</div>
        </div>
    </div>

    <div class="filters">
        <label>Filter by AI Type:</label>
        <select id="aiTypeFilter">
            <option value="">All Types</option>
            <option value="AI Agent">AI Agent</option>
            <option value="AI Feature">AI Feature</option>
        </select>

        <label>Filter by Availability:</label>
        <select id="availabilityFilter">
            <option value="">All</option>
            <option value="Generally Available">Generally Available</option>
            <option value="Beta">Beta</option>
            <option value="Early Adopter Care (EAC)">Early Adopter Care (EAC)</option>
        </select>

        <button onclick="loadData()">Reload Data</button>
    </div>

    <div class="results">
        <h2>Results (<span id="resultCount">0</span>)</h2>
        <div id="results"></div>
    </div>

    <script>
        let allUseCases = [];

        function parseCSVLine(line, delimiter = ',') {
            const values = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];

                if (char === '"') {
                    if (inQuotes && line[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === delimiter && !inQuotes) {
                    values.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            values.push(current.trim());
            return values;
        }

        function parseCSV(csvContent) {
            let content = csvContent;
            if (content.charCodeAt(0) === 0xFEFF) {
                content = content.slice(1);
            }

            const lines = content.split('\n');
            if (lines.length < 2) return [];

            const useCases = [];

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                const values = parseCSVLine(line, ',');

                if (values.length < 5) continue;

                const useCase = {
                    id: values[9] || `uc-${i}`,
                    identifier: values[9] || '',
                    name: values[0] || '',
                    ai_type: values[1] || '',
                    commercial_type: values[2] || '',
                    product: values[3] || '',
                    description: values[4] || '',
                    product_category: values[5] || '',
                    package: values[6] || '',
                    quick_filters: values[7] || '',
                    availability: values[8] || '',
                    url: values[10] || '',
                };

                if (useCase.name) {
                    useCases.push(useCase);
                }
            }

            return useCases;
        }

        async function loadData() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '<div class="success">Loading CSV data...</div>';

            try {
                const response = await fetch('sap_ai_data.csv');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const csvContent = await response.text();
                allUseCases = parseCSV(csvContent);

                updateStats();
                applyFilters();

                statusDiv.innerHTML = `<div class="success">✅ Loaded ${allUseCases.length} use cases from CSV</div>`;
            } catch (error) {
                statusDiv.innerHTML = `<div class="error">❌ Error loading CSV: ${error.message}</div>`;
                console.error('Error loading CSV:', error);
            }
        }

        function updateStats() {
            const agents = allUseCases.filter(uc => uc.ai_type === 'AI Agent');
            const features = allUseCases.filter(uc => uc.ai_type === 'AI Feature');

            document.getElementById('total').textContent = allUseCases.length;
            document.getElementById('agents').textContent = agents.length;
            document.getElementById('features').textContent = features.length;
        }

        function applyFilters() {
            const aiType = document.getElementById('aiTypeFilter').value;
            const availability = document.getElementById('availabilityFilter').value;

            let filtered = [...allUseCases];

            if (aiType) {
                filtered = filtered.filter(uc => uc.ai_type === aiType);
            }

            if (availability) {
                filtered = filtered.filter(uc => uc.availability === availability);
            }

            displayResults(filtered);
        }

        function displayResults(useCases) {
            const resultsDiv = document.getElementById('results');
            const countSpan = document.getElementById('resultCount');
            const filteredStat = document.getElementById('filtered');

            countSpan.textContent = useCases.length;
            filteredStat.textContent = useCases.length;

            if (useCases.length === 0) {
                resultsDiv.innerHTML = '<p>No use cases found matching the filters.</p>';
                return;
            }

            resultsDiv.innerHTML = useCases.map(uc => `
                <div class="use-case-card ${uc.ai_type === 'AI Agent' ? 'agent' : 'feature'}">
                    <h3>
                        <span class="type-badge ${uc.ai_type === 'AI Agent' ? 'agent-badge' : 'feature-badge'}">
                            ${uc.ai_type === 'AI Agent' ? '🤖' : '✨'} ${uc.ai_type}
                        </span>
                        ${uc.identifier}: ${uc.name}
                    </h3>
                    <p><strong>Product:</strong> ${uc.product}</p>
                    <p><strong>Category:</strong> ${uc.product_category}</p>
                    <p><strong>Availability:</strong> ${uc.availability}</p>
                    ${uc.commercial_type ? `<p><strong>Commercial Type:</strong> ${uc.commercial_type}</p>` : ''}
                    <p>${uc.description}</p>
                    ${uc.url ? `<p><a href="${uc.url}" target="_blank">View Details →</a></p>` : ''}
                </div>
            `).join('');
        }

        // Set up event listeners
        document.getElementById('aiTypeFilter').addEventListener('change', applyFilters);
        document.getElementById('availabilityFilter').addEventListener('change', applyFilters);

        // Load data on page load
        loadData();
    </script>
</body>
</html>
